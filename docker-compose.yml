services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wards_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wards_db}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - wards_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - wards_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ./WARDS/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./WARDS/backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-wards_root_password}@mysql:3306/${MYSQL_DATABASE:-wards_db}
      REDIS_URL: redis://redis:6379/0
      SECURITY_DEPLOYMENT_MODE: deployed
      SECURITY_MONITORING_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./WARDS:/WARDS
      - ./OCR:/OCR
      - ./WARDS/backend/uploads:/app/uploads
      # TEMPORARY (Phase 2-6): read-only SECURITY mount during 2-VM transition.
      # security_dashboard.py still imports SECURITY.security_models for ORM queries.
      # Remove this mount once dashboard routes fully proxy to VM 2 (future Phase 8).
      - ./SECURITY:/SECURITY:ro

  frontend:
    build:
      context: ./WARDS/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  vm1-reporter:
    image: python:3.11-slim
    restart: unless-stopped
    env_file:
      - ./WARDS/backend/.env
    environment:
      VM1_WARDS_DIR: /WARDS
      VM1_OCR_DIR: /OCR
      VM1_REPORT_INTERVAL: "30"
      VM1_HEARTBEAT_INTERVAL: "10"
      VM1_RESTORE_POLL_INTERVAL: "15"
      VM1_MAX_SNAPSHOT_BYTES: "102400"
    volumes:
      - ./WARDS:/WARDS:ro
      - ./OCR:/OCR:ro
      - ./scripts/vm1_security_reporter.py:/app/vm1_security_reporter.py:ro
      - vm1_snapshots:/app/.vm1_snapshots
    command: >
      sh -c "pip install --no-cache-dir requests && python3 /app/vm1_security_reporter.py"
    depends_on:
      - backend

volumes:
  wards_mysql_data:
  wards_redis_data:
  vm1_snapshots:
