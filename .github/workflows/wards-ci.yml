name: WARDS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r WARDS/backend/requirements.txt
      - name: Compile backend
        run: |
          python -m py_compile WARDS/backend/main.py
          python -m py_compile SECURITY/security_engine.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: WARDS/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: WARDS/frontend
        run: npm ci
      - name: Build frontend
        working-directory: WARDS/frontend
        run: npm run build

