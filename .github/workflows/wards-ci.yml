name: WARDS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject committed runtime artifacts
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          forbidden_patterns = [
              r"(^|/)QUARANTINE(/|$)",
              r"(^|/)SECURITY/(.*/)?[^/]*backup[^/]*/",
              r"(^|/)WARDS/(.*/)?[^/]*backup[^/]*/",
              r"(^|/)OCR/(.*/)?[^/]*backup[^/]*/",
              r"(^|/)DEFACEMENT/(.*/)?[^/]*backup[^/]*/",
              r"(^|/).*_backup_[0-9]{8}_[0-9]{6}(/|$)",
              r"(^|/)\.env($|\.)",
              r"\.(db|sqlite|sqlite3|log)$",
              r"(^|/)(node_modules|venv|\.venv|__pycache__|dist|build)(/|$)",
          ]
          allowed_patterns = [
              r"(^|/)\.env\.example$",
              r"(^|/)WARDS/backend/README\.md$",
              r"(^|/)FIRST_TIME_INSTALLATION\.md$",
              r"(^|/)SECURITY/.*\.md$",
          ]

          bad = []
          for path in tracked:
              normalized = path.replace("\\", "/")
              if any(re.search(pattern, normalized, re.IGNORECASE) for pattern in allowed_patterns):
                  continue
              if any(re.search(pattern, normalized, re.IGNORECASE) for pattern in forbidden_patterns):
                  bad.append(path)

          if bad:
              print("Forbidden generated/runtime files are tracked. Remove them from git and keep them ignored:")
              for path in bad:
                  print(f" - {path}")
              print("\nUseful cleanup command:")
              print("git rm -r --cached <path>")
              sys.exit(1)

          print("Repository hygiene check passed.")

  backend:
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r WARDS/backend/requirements.txt
      - name: Compile backend
        run: |
          python -m compileall WARDS/backend SECURITY tests
      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/WARDS/backend:${{ github.workspace }}
          ADMIN_SECRET_KEY: ci-test-admin-secret
          USER_SECRET_KEY: ci-test-user-secret
          BRANCH_SECRET_KEY: ci-test-branch-secret
          PASSWORD_RESET_SECRET_KEY: ci-test-reset-secret
          DATA_ENCRYPTION_SECRET: ci-test-data-encryption-secret
          DATA_HASH_SECRET: ci-test-data-hash-secret
          LOG_INTEGRITY_SECRET: ci-test-log-integrity-secret
          BACKUP_INTEGRITY_SECRET: ci-test-backup-integrity-secret
          RECAPTCHA_SECRET_KEY: ci-test-recaptcha-secret
          PAYMONGO_WEBHOOK_SECRET: ci-test-webhook-secret
        run: pytest -q tests
      - name: Run authentication workflow tests
        env:
          PYTHONPATH: ${{ github.workspace }}/WARDS/backend:${{ github.workspace }}
          ADMIN_SECRET_KEY: ci-test-admin-secret
          USER_SECRET_KEY: ci-test-user-secret
          BRANCH_SECRET_KEY: ci-test-branch-secret
          PASSWORD_RESET_SECRET_KEY: ci-test-reset-secret
          DATA_ENCRYPTION_SECRET: ci-test-data-encryption-secret
          DATA_HASH_SECRET: ci-test-data-hash-secret
          LOG_INTEGRITY_SECRET: ci-test-log-integrity-secret
          BACKUP_INTEGRITY_SECRET: ci-test-backup-integrity-secret
          RECAPTCHA_SECRET_KEY: ci-test-recaptcha-secret
          PAYMONGO_WEBHOOK_SECRET: ci-test-webhook-secret
          TOKEN_BINDING_STRICT: "true"
        run: pytest -q tests/test_unified_auth.py tests/test_unified_auth_extended.py tests/test_auth_workflows.py

  frontend:
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: WARDS/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: WARDS/frontend
        run: npm ci
      - name: Build frontend
        working-directory: WARDS/frontend
        run: npm run build

  deploy-digitalocean:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DIGITALOCEAN_DEPLOY == 'true'
    steps:
      - name: Configure SSH key
        env:
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          test -n "$DO_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$DO_SSH_KEY" > ~/.ssh/wards_deploy_key
          chmod 600 ~/.ssh/wards_deploy_key
      - name: Trust DigitalOcean host
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          test -n "$DO_HOST"
          ssh-keyscan -H "$DO_HOST" >> ~/.ssh/known_hosts
      - name: Deploy application
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_APP_DIR: ${{ secrets.DO_APP_DIR }}
        run: |
          test -n "$DO_HOST"
          test -n "$DO_USER"
          test -n "$DO_APP_DIR"
          ssh -i ~/.ssh/wards_deploy_key "$DO_USER@$DO_HOST" "cd '$DO_APP_DIR' && docker compose stop backend && git fetch origin main && git reset --hard origin/main && docker compose up -d --build && docker compose ps"
      - name: Smoke test deployment
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          curl --fail --retry 10 --retry-delay 5 --retry-connrefused "http://$DO_HOST:3000/"
          curl --fail --retry 10 --retry-delay 5 --retry-connrefused "http://$DO_HOST:8000/api/health"

  deploy-vm2:
    needs: [deploy-digitalocean]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_VM2_DEPLOY == 'true'
    steps:
      - name: Configure SSH key for VM 2
        env:
          VM2_SSH_KEY: ${{ secrets.VM2_SSH_KEY }}
        run: |
          test -n "$VM2_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VM2_SSH_KEY" > ~/.ssh/vm2_deploy_key
          chmod 600 ~/.ssh/vm2_deploy_key
      - name: Trust VM 2 host
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
        run: |
          test -n "$VM2_HOST"
          ssh-keyscan -H "$VM2_HOST" >> ~/.ssh/known_hosts
      - name: Deploy to VM 2 (Security Server)
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USER: ${{ secrets.VM2_USER }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          test -n "$VM2_HOST"
          test -n "$VM2_USER"
          test -n "$VM2_APP_DIR"
          ssh -i ~/.ssh/vm2_deploy_key "$VM2_USER@$VM2_HOST" "cd '$VM2_APP_DIR' && docker compose -f docker-compose.security.yml stop security-api && git fetch origin main && git reset --hard origin/main && docker compose -f docker-compose.security.yml up -d --build && docker compose -f docker-compose.security.yml ps"
      - name: Smoke test VM 2 health
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_API_KEY: ${{ secrets.APP_API_KEY }}
        run: |
          curl --fail --retry 10 --retry-delay 5 --retry-connrefused \
            -H "X-API-Key: $VM2_API_KEY" \
            "http://$VM2_HOST:8443/health"
