name: WARDS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject committed runtime artifacts
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          forbidden_patterns = [
              r"(^|/)QUARANTINE(/|$)",
              r"(^|/)SECURITY/(.*/)?[^/]*backup[^/]*/",
              r"(^|/)WARDS/(.*/)?[^/]*backup[^/]*/",
              r"(^|/)OCR/(.*/)?[^/]*backup[^/]*/",
              r"(^|/)DEFACEMENT/(.*/)?[^/]*backup[^/]*/",
              r"(^|/).*_backup_[0-9]{8}_[0-9]{6}(/|$)",
              r"(^|/)\.env($|\.)",
              r"\.(db|sqlite|sqlite3|log)$",
              r"(^|/)(node_modules|venv|\.venv|__pycache__|dist|build)(/|$)",
          ]
          allowed_patterns = [
              r"(^|/)\.env\.example$",
              r"(^|/)WARDS/backend/README\.md$",
              r"(^|/)FIRST_TIME_INSTALLATION\.md$",
              r"(^|/)SECURITY/.*\.md$",
          ]

          bad = []
          for path in tracked:
              normalized = path.replace("\\", "/")
              if any(re.search(pattern, normalized, re.IGNORECASE) for pattern in allowed_patterns):
                  continue
              if any(re.search(pattern, normalized, re.IGNORECASE) for pattern in forbidden_patterns):
                  bad.append(path)

          if bad:
              print("Forbidden generated/runtime files are tracked. Remove them from git and keep them ignored:")
              for path in bad:
                  print(f" - {path}")
              print("\nUseful cleanup command:")
              print("git rm -r --cached <path>")
              sys.exit(1)

          print("Repository hygiene check passed.")

  backend:
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r WARDS/backend/requirements.txt
      - name: Compile backend
        run: |
          python -m compileall WARDS/backend SECURITY tests
      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/WARDS/backend:${{ github.workspace }}
          ADMIN_SECRET_KEY: ci-test-admin-secret
          USER_SECRET_KEY: ci-test-user-secret
          BRANCH_SECRET_KEY: ci-test-branch-secret
          PASSWORD_RESET_SECRET_KEY: ci-test-reset-secret
          DATA_ENCRYPTION_SECRET: ci-test-data-encryption-secret
          DATA_HASH_SECRET: ci-test-data-hash-secret
          LOG_INTEGRITY_SECRET: ci-test-log-integrity-secret
          BACKUP_INTEGRITY_SECRET: ci-test-backup-integrity-secret
          RECAPTCHA_SECRET_KEY: ci-test-recaptcha-secret
          PAYMONGO_WEBHOOK_SECRET: ci-test-webhook-secret
        run: pytest -q tests
      - name: Run authentication workflow tests
        env:
          PYTHONPATH: ${{ github.workspace }}/WARDS/backend:${{ github.workspace }}
          ADMIN_SECRET_KEY: ci-test-admin-secret
          USER_SECRET_KEY: ci-test-user-secret
          BRANCH_SECRET_KEY: ci-test-branch-secret
          PASSWORD_RESET_SECRET_KEY: ci-test-reset-secret
          DATA_ENCRYPTION_SECRET: ci-test-data-encryption-secret
          DATA_HASH_SECRET: ci-test-data-hash-secret
          LOG_INTEGRITY_SECRET: ci-test-log-integrity-secret
          BACKUP_INTEGRITY_SECRET: ci-test-backup-integrity-secret
          RECAPTCHA_SECRET_KEY: ci-test-recaptcha-secret
          PAYMONGO_WEBHOOK_SECRET: ci-test-webhook-secret
          TOKEN_BINDING_STRICT: "true"
        run: pytest -q tests/test_unified_auth.py tests/test_unified_auth_extended.py tests/test_auth_workflows.py

  frontend:
    needs: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: WARDS/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: WARDS/frontend
        run: npm ci
      - name: Build frontend
        working-directory: WARDS/frontend
        run: npm run build

  deploy-status:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - name: Wait for webhook deploy
        run: sleep 60
      - name: Check VM sync and commit validity
        env:
          VM2_API_KEY: ${{ secrets.VM2_API_KEY || '3e5833e12a888a95601b31f69b4e9bb8612f0e17807020deeb4d24f43e3e68c1' }}
        run: |
          VM1_COMMIT=$(curl -sSf http://152.42.249.84:9000/deploy-status | jq -r '.commit')
          VM2_COMMIT=$(curl -sSf -H "X-API-Key: $VM2_API_KEY" http://146.190.97.87:8443/internal/deploy-status | jq -r '.commit')
          echo "VM1 commit: $VM1_COMMIT"
          echo "VM2 commit: $VM2_COMMIT"

          if [ "$VM1_COMMIT" != "$VM2_COMMIT" ]; then
            echo "VMs are NOT synchronized (commits differ)"
            exit 1
          fi

          if ! git merge-base --is-ancestor "$VM1_COMMIT" origin/main; then
            echo "Deployed commit $VM1_COMMIT is not on origin/main"
            exit 1
          fi

          echo "VMs synchronized at $VM1_COMMIT (on origin/main) — deploy verified."
