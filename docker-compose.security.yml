services:
  security-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SEC_MYSQL_ROOT_PASSWORD:-sec_root_password}
      MYSQL_DATABASE: wards_security_db
    volumes:
      - sec_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  security-api:
    build:
      context: .
      dockerfile: ./SECURITY/Dockerfile.security
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:${SEC_MYSQL_ROOT_PASSWORD:-sec_root_password}@security-db:3306/wards_security_db
      APP_API_KEY: ${APP_API_KEY:-change-me}
      WARDS_APP_IP: ${WARDS_APP_IP:-}
      SECURITY_DEPLOYMENT_MODE: ${SECURITY_DEPLOYMENT_MODE:-deployed}
      SECURITY_MONITORING_ENABLED: ${SECURITY_MONITORING_ENABLED:-true}
      WAZUH_ENABLED: ${WAZUH_ENABLED:-false}
      SECURITY_SCAN_INTERVAL_SECONDS: ${SECURITY_SCAN_INTERVAL_SECONDS:-30}
      VM2_APP_DIR: /app/repo
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-change-me-admin-secret}
      USER_SECRET_KEY: ${USER_SECRET_KEY:-change-me-user-secret}
      BRANCH_SECRET_KEY: ${BRANCH_SECRET_KEY:-change-me-branch-secret}
      PASSWORD_RESET_SECRET_KEY: ${PASSWORD_RESET_SECRET_KEY:-change-me-password-reset-secret}
      LOG_INTEGRITY_SECRET: ${LOG_INTEGRITY_SECRET:-change-me-log-integrity-secret}
      DATA_HASH_SECRET: ${DATA_HASH_SECRET:-change-me-data-hash-secret}
      DATA_ENCRYPTION_SECRET: ${DATA_ENCRYPTION_SECRET:-change-me-data-encryption-secret}
      BACKUP_INTEGRITY_SECRET: ${BACKUP_INTEGRITY_SECRET:-change-me-backup-integrity-secret}
      # Email configuration (shared with VM1 so security incident alerts can be sent)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-WARDS Admin}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    ports:
      - "8443:8443"
    depends_on:
      security-db:
        condition: service_healthy
    volumes:
      - ./SECURITY:/app/SECURITY
      - ./QUARANTINE:/app/QUARANTINE
      - .:/app/repo
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  sec_mysql_data:
